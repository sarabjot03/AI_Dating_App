services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: spark
      POSTGRES_PASSWORD: spark
      POSTGRES_DB: spark
    ports:
      - '5432:5432'
    volumes:
      - spark_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U spark -d spark']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  spark_pgdata:
